name: Build GitHub draft release

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v7

      - name: Validate tag and package version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="$(node -p "require('./package.json').version")"
          test "${tag}" = "v${version}" || {
            echo "Tag ${tag} must exactly match package.json version ${version}"
            exit 1
          }
          [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]] || {
            echo "package.json version must be valid semver"
            exit 1
          }
          if [[ "${version}" == *-* ]]; then
            prerelease=true
          else
            prerelease=false
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

  build:
    needs: validate-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      npm_config_arch: ${{ matrix.arch }}
    strategy:
      # 每个平台均完成后才创建 Release；单个平台失败不会取消其余构建，
      # 但会阻止整个版本发布。
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            command: pnpm run build:linux -p never
            artifact: linux
            arch: x64
          - os: macos-15-intel
            command: pnpm build && pnpm exec electron-builder --mac --x64 -p never
            artifact: macos-x64
            arch: x64
          - os: macos-14
            command: pnpm build && pnpm exec electron-builder --mac --arm64 -p never
            artifact: macos-arm64
            arch: arm64
          - os: windows-2022
            command: pnpm build && pnpm exec electron-builder --win --x64 -p never
            artifact: windows-x64
            arch: x64
          - os: windows-2022
            command: pnpm build && pnpm exec electron-builder --win --ia32 -p never
            artifact: windows-ia32
            arch: ia32

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache Electron build tools
        uses: actions/cache@v6
        with:
          path: |
            ${{ runner.temp }}/electron-cache
            ${{ runner.temp }}/electron-builder-cache
          key: electron-build-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            electron-build-${{ runner.os }}-${{ matrix.arch }}-

      - name: Install Dependencies
        # ffmpeg-static 的 b6.1.1 未发布 win32-ia32 二进制；仅 32 位构建回退到
        # 仍提供该架构的 b6.0，其余构建继续使用依赖默认的 b6.1.1。
        env:
          FFMPEG_BINARY_RELEASE: ${{ matrix.arch == 'ia32' && 'b6.0' || '' }}
          ELECTRON_CACHE: ${{ runner.temp }}/electron-cache
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder-cache
        run: pnpm install --frozen-lockfile

      - name: Build application
        env:
          ELECTRON_CACHE: ${{ runner.temp }}/electron-cache
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder-cache
        run: ${{ matrix.command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.artifact }}
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml
            dist/*.blockmap
          compression-level: 0
          if-no-files-found: error
          retention-days: 1

  prepare-release:
    needs: [validate-release, build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      GH_REPO: 11273/QzonePhoto
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v7

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -la artifacts/*/

      - name: Prepare unique release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir release-assets
          while IFS= read -r -d '' file; do
            name="$(basename "${file}")"
            test ! -e "release-assets/${name}" || {
              echo "Duplicate release asset produced: ${name}"
              exit 1
            }
            cp "${file}" "release-assets/${name}"
          done < <(
            find artifacts -type f \( -name '*.exe' -o -name '*.zip' -o -name '*.dmg' -o \
              -name '*.AppImage' -o -name '*.deb' -o -name '*.blockmap' \) \
              -print0 | sort -z
          )
          test -n "$(find release-assets -maxdepth 1 -type f -print -quit)" || {
            echo 'No release assets found'
            exit 1
          }

      - name: Merge multi-architecture update metadata
        run: node scripts/merge-update-metadata.mjs --artifacts=artifacts --out=release-assets

      - name: Verify release assets and updater metadata
        shell: bash
        run: |
          set -euo pipefail
          node scripts/verify-release-assets.mjs \
            --assets=release-assets \
            --version="${{ needs.validate-release.outputs.version }}" \
            --fileList=verified-release-files.txt
          mkdir verified-release-assets
          while IFS= read -r name; do
            cp "release-assets/${name}" "verified-release-assets/${name}"
          done < verified-release-files.txt
          rm -rf release-assets
          mv verified-release-assets release-assets

      - name: Display release assets
        run: ls -lah release-assets

      - name: Create or update GitHub draft release
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            draft="$(gh release view "${GITHUB_REF_NAME}" --repo "${GH_REPO}" --json isDraft --jq '.isDraft')"
            test "${draft}" = 'true' || {
              echo "Refusing to replace the published release ${GITHUB_REF_NAME}"
              exit 1
            }
          else
            release_args=(--draft --verify-tag --title "Release ${GITHUB_REF_NAME}" --notes-file RELEASE_NOTES.md)
            if [ "${{ needs.validate-release.outputs.prerelease }}" = 'true' ]; then
              release_args+=(--prerelease)
            fi
            gh release create "${GITHUB_REF_NAME}" --repo "${GH_REPO}" "${release_args[@]}"
          fi

          for attempt in 1 2 3; do
            if gh release upload "${GITHUB_REF_NAME}" release-assets/* --repo "${GH_REPO}" --clobber; then
              exit 0
            fi
            test "${attempt}" = 3 && exit 1
            sleep $((attempt * 3))
          done
        env:
          GH_TOKEN: ${{ github.token }}
