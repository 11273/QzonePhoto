name: Promote verified release to R2

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 指定要同步的已验证标签（可选；留空自动选择最新公开版本）
        required: false
        default: ''
        type: string
      allow_rollback:
        description: 紧急回退稳定通道（仅在手动指定旧标签并确认后启用）
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: promote-r2
  cancel-in-progress: false

jobs:
  promote-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: 'true'
      R2_BUCKET: ${{ vars.R2_BUCKET }}
      R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
      R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
      RELEASE_TAG: ${{ inputs.tag }}
      REQUESTED_TAG: ${{ inputs.tag }}
      ALLOW_ROLLBACK: ${{ inputs.allow_rollback }}
      GH_TOKEN: ${{ github.token }}
      GH_REPO: 11273/QzonePhoto
    steps:
      - name: Validate R2 promotion configuration
        run: |
          set -euo pipefail
          test -n "${AWS_ACCESS_KEY_ID:-}" || { echo "Missing secret: R2_ACCESS_KEY_ID"; exit 1; }
          test -n "${AWS_SECRET_ACCESS_KEY:-}" || { echo "Missing secret: R2_SECRET_ACCESS_KEY"; exit 1; }
          test -n "${R2_BUCKET:-}" || { echo "Missing repository variable: R2_BUCKET"; exit 1; }
          test -n "${R2_ENDPOINT:-}" || { echo "Missing repository variable: R2_ENDPOINT"; exit 1; }
          test "${R2_PUBLIC_BASE_URL:-}" = "https://dl.qzonephoto.getgit.one" || {
            echo "R2_PUBLIC_BASE_URL must be https://dl.qzonephoto.getgit.one"
            exit 1
          }

      - name: Resolve release to promote
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TAG}" ]; then
            RELEASE_TAG="$(gh release list --repo "${GH_REPO}" --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName')"
            test -n "${RELEASE_TAG}" || {
              echo 'No published stable GitHub Release is available to promote'
              exit 1
            }
            echo "Automatically selected latest published release: ${RELEASE_TAG}"
          fi
          if [ "${ALLOW_ROLLBACK}" = 'true' ]; then
            test -n "${REQUESTED_TAG}" || {
              echo 'Rollback requires an explicitly selected release tag'
              exit 1
            }
            echo "Emergency rollback explicitly enabled for ${RELEASE_TAG}"
          fi
          [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "Only stable tags such as v2.6.1 can enter the R2 stable channel"
            exit 1
          }
          draft="$(gh release view "${RELEASE_TAG}" --repo "${GH_REPO}" --json isDraft --jq '.isDraft')"
          prerelease="$(gh release view "${RELEASE_TAG}" --repo "${GH_REPO}" --json isPrerelease --jq '.isPrerelease')"
          published_at="$(gh release view "${RELEASE_TAG}" --repo "${GH_REPO}" --json publishedAt --jq '.publishedAt')"
          test "${draft}" = 'false' || { echo "Release ${RELEASE_TAG} must be public before R2 promotion"; exit 1; }
          test "${prerelease}" = 'false' || { echo "Release ${RELEASE_TAG} must not be a prerelease"; exit 1; }
          node -e 'const value = process.argv[1]; if (Number.isNaN(Date.parse(value))) process.exit(1)' "${published_at}" || {
            echo "Release ${RELEASE_TAG} has an invalid publishedAt timestamp"
            exit 1
          }
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "${GITHUB_ENV}"
          echo "RELEASE_VERSION=${RELEASE_TAG#v}" >> "${GITHUB_ENV}"
          echo "RELEASE_PUBLISHED_AT=${published_at}" >> "${GITHUB_ENV}"
          {
            echo '### R2 release selected'
            echo
            echo "- Tag: \`${RELEASE_TAG}\`"
            echo '- Source: latest published GitHub Release'
            if [ "${ALLOW_ROLLBACK}" = 'true' ]; then
              echo '- Stable channel: emergency rollback explicitly approved'
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Check out release scripts from main
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Download matching public release assets
        run: |
          set -euo pipefail
          mkdir -p artifacts
          gh release download "${RELEASE_TAG}" --repo "${GH_REPO}" --dir artifacts \
            --pattern '*.exe' --pattern '*.zip' --pattern '*.dmg' \
            --pattern '*.AppImage' --pattern '*.deb' --pattern 'latest*.yml' \
            --pattern '*.blockmap'
          test -n "$(find artifacts -type f -name 'latest*.yml' -print -quit)" || {
            echo "Release is missing updater metadata"
            exit 1
          }

      - name: Generate public download manifest
        run: |
          set -euo pipefail
          node scripts/verify-release-assets.mjs \
            --assets=artifacts --version="${RELEASE_VERSION}" \
            --fileList=verified-release-files.txt
          mkdir verified-assets
          while IFS= read -r name; do
            cp "artifacts/${name}" "verified-assets/${name}"
          done < verified-release-files.txt
          generated_at="${RELEASE_PUBLISHED_AT}"
          manifest_key="manifests/${RELEASE_TAG}.json"
          if aws s3api head-object --bucket "${R2_BUCKET}" --key "${manifest_key}" \
            --endpoint-url "${R2_ENDPOINT}" >/dev/null 2>&1; then
            aws s3 cp "s3://${R2_BUCKET}/${manifest_key}" existing-release-manifest.json \
              --endpoint-url "${R2_ENDPOINT}" --only-show-errors
            generated_at="$(node -e 'const value = require("./existing-release-manifest.json"); const date = new Date(value.generatedAt); if (Number.isNaN(date.getTime())) process.exit(1); process.stdout.write(date.toISOString())')" || {
              echo "Existing immutable manifest has an invalid generatedAt timestamp"
              exit 1
            }
          fi
          node scripts/generate-release-manifest.mjs \
            --artifacts=verified-assets --out="artifacts/${RELEASE_TAG}.json" --tag="${RELEASE_TAG}" \
            --releasePath="${RELEASE_TAG}" --publicBaseUrl="${R2_PUBLIC_BASE_URL}" --githubRepo="${GH_REPO}" \
            --generatedAt="${generated_at}"

      - name: Prevent stable channel rollback
        run: |
          set -euo pipefail
          for metadata in latest.yml latest-mac.yml latest-linux.yml; do
            if aws s3api head-object \
              --bucket "${R2_BUCKET}" --key "releases/latest/${metadata}" \
              --endpoint-url "${R2_ENDPOINT}" >/dev/null 2>&1; then
              aws s3 cp "s3://${R2_BUCKET}/releases/latest/${metadata}" "current-${metadata}" \
                --endpoint-url "${R2_ENDPOINT}" --only-show-errors
              if [ "${ALLOW_ROLLBACK}" = 'true' ]; then
                echo "Explicit rollback approved: replacing ${metadata}"
              else
                node scripts/assert-forward-promotion.mjs \
                  --current="current-${metadata}" --candidate="artifacts/${metadata}"
              fi
            else
              echo "No existing ${metadata}; its first stable promotion is allowed"
            fi
          done

      - name: Upload and verify release files, then switch stable metadata
        shell: bash
        run: |
          set -euo pipefail
          upload_and_verify() {
            local file="$1"
            local key="$2"
            local cache_control="$3"
            local content_type="${4:-}"
            local mutable="${5:-false}"
            local size
            local sha512
            size="$(stat --format=%s "$file")"
            sha512="$(openssl dgst -sha512 -binary "$file" | base64 -w0)"
            if [ "${mutable}" != 'true' ] && aws s3api head-object --bucket "${R2_BUCKET}" --key "${key}" \
              --endpoint-url "${R2_ENDPOINT}" >/dev/null 2>&1; then
              remote_size="$(aws s3api head-object --bucket "${R2_BUCKET}" --key "${key}" \
                --endpoint-url "${R2_ENDPOINT}" --query ContentLength --output text)"
              remote_sha512="$(aws s3api head-object --bucket "${R2_BUCKET}" --key "${key}" \
                --endpoint-url "${R2_ENDPOINT}" --query 'Metadata."qzone-sha512"' --output text)"
              test "${remote_size}" = "${size}" && test "${remote_sha512}" = "${sha512}" || {
                echo "Refusing to overwrite immutable R2 object with different content: ${key}"
                exit 1
              }
              echo "Verified existing immutable object: ${key}"
              return
            fi
            args=(s3 cp "$file" "s3://${R2_BUCKET}/${key}" --endpoint-url "${R2_ENDPOINT}" --cache-control "${cache_control}" --checksum-algorithm SHA256 --metadata "qzone-sha512=${sha512}" --only-show-errors)
            if [ -n "${content_type}" ]; then
              args+=(--content-type "${content_type}")
            fi
            aws "${args[@]}"
            remote_size="$(aws s3api head-object --bucket "${R2_BUCKET}" --key "${key}" \
              --endpoint-url "${R2_ENDPOINT}" --query ContentLength --output text)"
            remote_sha512="$(aws s3api head-object --bucket "${R2_BUCKET}" --key "${key}" \
              --endpoint-url "${R2_ENDPOINT}" --query 'Metadata."qzone-sha512"' --output text)"
            test "${remote_size}" = "${size}" && test "${remote_sha512}" = "${sha512}" || {
              echo "R2 object verification failed for ${key}"
              exit 1
            }
          }

          release_prefix="releases/${RELEASE_TAG}"
          while IFS= read -r name; do
            case "${name}" in
              latest*.yml)
                upload_and_verify "artifacts/${name}" "${release_prefix}/${name}" \
                  "no-cache, no-store, max-age=0" "application/x-yaml"
                ;;
              *)
                upload_and_verify "verified-assets/${name}" "${release_prefix}/${name}" \
                  "public, max-age=31536000, immutable"
                ;;
            esac
          done < verified-release-files.txt
          upload_and_verify "artifacts/${RELEASE_TAG}.json" "manifests/${RELEASE_TAG}.json" "public, max-age=31536000, immutable" "application/json"
          echo 'All immutable versioned objects are verified; uploading stable download objects.'
          while IFS= read -r name; do
            case "${name}" in
              latest*.yml) ;;
              *) upload_and_verify "verified-assets/${name}" "releases/latest/${name}" \
                "public, max-age=31536000, immutable" ;;
            esac
          done < verified-release-files.txt
          for name in latest.yml latest-mac.yml latest-linux.yml; do
            upload_and_verify "artifacts/${name}" "releases/latest/${name}" \
              "no-cache, no-store, max-age=0" "application/x-yaml" true
          done
          upload_and_verify "artifacts/${RELEASE_TAG}.json" "manifests/latest.json" \
            "no-cache, no-store, max-age=0" "application/json" true
